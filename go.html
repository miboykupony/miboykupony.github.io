<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Przekierowanie - miboykupony</title>
    <meta name="robots" content="noindex, nofollow">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin:0;
            font-family:Arial,sans-serif;
            background:#f5f6f8;
            color:#111;
            min-height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
            padding:20px;
        }

        .box {
            background:#fff;
            max-width:460px;
            width:100%;
            border-radius:22px;
            padding:30px;
            text-align:center;
            box-shadow:0 14px 40px rgba(0,0,0,.12);
        }

        .logo {
            font-size:36px;
            font-weight:900;
            margin-bottom:10px;
        }

        .logo span {
            color:#ff4b2b;
        }

        .button {
            display:inline-block;
            margin-top:18px;
            background:linear-gradient(135deg,#ff4b2b,#ff7847);
            color:white;
            padding:14px 24px;
            border-radius:999px;
            text-decoration:none;
            font-weight:bold;
        }
    </style>
</head>
<body>
    <div class="box">
        <div class="logo">miboy<span>kupony</span></div>
        <h1>Przekierowanie do oferty</h1>
        <p>Za chwilę otworzy się aktualna oferta.</p>
        <a id="goButton" class="button" href="#">Przejdź do oferty</a>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        let url = params.get("u");

        if (!url || !url.startsWith("http")) {
            url = "https://rzekl.com/g/1e8d114494878ea1054c16525dc3e8/?ulp=https%3A%2F%2Fbest.aliexpress.com%2F%3Fspm%3Da2g0o.tm1000066817.logo.1.6e602ae5qrrbim%26_gl%3D1%2Ajrjr4m%2A_gcl_au%2ANzA3NjcyNzU4LjE3Nzc3ODU0NjU.%2A_ga%2AMjEzOTQ5MDIxLjE3NjgwNTA0MTg.%2A_ga_VED1YSGNC7%2AczE3ODM0ODc1NzEkbzEzJGcxJHQxNzgzNDkyMTQ2JGo2MCRsMCRoMA..%26browser_redirect%3Dtrue";
        }

        const button = document.getElementById("goButton");
        button.href = url;

        setTimeout(function () {
            window.location.href = url;
        }, 700);
    </script>
</body>
</html>
