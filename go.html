<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Przekierowanie - miboykupony</title>
    <meta name="robots" content="noindex">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f5f7;
            color: #222;
            display: flex;
            min-height: 100vh;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .box {
            background: white;
            border-radius: 18px;
            padding: 28px;
            max-width: 420px;
            box-shadow: 0 8px 28px rgba(0,0,0,0.10);
        }

        h1 {
            margin-top: 0;
            color: #ff4b2b;
        }

        .button {
            display: inline-block;
            margin-top: 15px;
            background: #ff4b2b;
            color: white;
            padding: 13px 22px;
            border-radius: 999px;
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="box">
    <h1>miboykupony</h1>
    <p>Przekierowuję do aktualnej oferty...</p>
    <p>Jeśli przekierowanie nie nastąpi automatycznie, kliknij przycisk.</p>
    <a id="goButton" class="button" href="#">Przejdź do oferty</a>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    const url = params.get("u");

    const button = document.getElementById("goButton");

    if (url && url.startsWith("http")) {
        button.href = url;

        setTimeout(function () {
            window.location.href = url;
        }, 700);
    } else {
        document.querySelector("p").innerText = "Brak poprawnego linku do oferty.";
        button.style.display = "none";
    }
</script>

</body>
</html>
